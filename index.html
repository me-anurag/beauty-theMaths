  <style>
/* =============================================
   BEAUTY & THE MATHS — Design System
   ============================================= */

:root {
  /* Core Palette */
  --bg:          #080c10;
  --bg-panel:    #0d1219;
  --bg-card:     #111820;
  --bg-hover:    #161f2a;
  --border:      #1e2d3d;
  --border-glow: #00ff8833;

  /* Greens — primary action/focus */
  --green:       #00ff88;
  --green-dim:   #00cc6a;
  --green-muted: #00ff8818;
  --green-glow:  0 0 20px #00ff8844, 0 0 60px #00ff8811;

  /* Text */
  --text-1:  #f0f6ff;
  --text-2:  #8899aa;
  --text-3:  #4a5a6a;

  /* State colors */
  --red:     #ff4466;
  --red-dim: #ff446622;
  --amber:   #ffaa00;
  --amber-dim: #ffaa0022;
  --blue:    #4488ff;

  /* Typography — WhatsApp system font stack for max readability */
  --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono:    -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-nums:    "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  /* Spacing */
  --nav-h: 56px;
  --panel-w: 300px;
  --radius: 10px;
  --radius-sm: 6px;

  /* Transitions */
  --fast: 80ms ease;
  --smooth: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --spring: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-display);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* =============================================
   LAYOUT
   ============================================= */
#app { height: 100dvh; display: flex; flex-direction: column; }

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* =============================================
   NAVBAR
   ============================================= */
.navbar {
  height: var(--nav-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 32px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.navbar-logo {
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
  color: var(--text-1);
  white-space: nowrap;
}
.navbar-logo span { color: var(--green); }

.navbar-nav {
  display: flex;
  gap: 4px;
  flex: 1;
}

.nav-item {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--text-3);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--smooth);
  text-transform: uppercase;
  border: none;
  background: none;
  position: relative;
  font-family: var(--font-display);
}
.nav-item:hover { color: var(--text-2); background: var(--bg-hover); }
.nav-item.active { color: var(--green); }
.nav-item.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--green);
  border-radius: 1px;
}
.nav-item .badge {
  font-size: 9px;
  background: var(--bg-card);
  color: var(--text-3);
  padding: 2px 5px;
  border-radius: 3px;
  margin-left: 4px;
  border: 1px solid var(--border);
}

.navbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
}

/* Streak */
.streak-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: default;
}
.streak-flame {
  font-size: 18px;
  animation: flicker 2s ease-in-out infinite;
}
@keyframes flicker {
  0%, 100% { transform: scaleY(1) rotate(-2deg); }
  50% { transform: scaleY(1.1) rotate(2deg); }
}
.streak-num {
  font-weight: 700;
  font-size: 16px;
  color: var(--amber);
}
.streak-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Day badge */
.day-badge {
  font-size: 12px;
  color: var(--text-2);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
}
.day-badge span { color: var(--green); font-weight: 700; }

/* =============================================
   SIDE PANEL — Table Selector
   ============================================= */
.side-panel {
  width: var(--panel-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-2);
  margin-bottom: 4px;
}
.panel-subtitle {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

/* Table Grid — 10 columns, cells 2–100 */
.table-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
}

.table-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 11px;
  border-radius: 5px;
  cursor: pointer;
  transition: var(--smooth);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-3);
  user-select: none;
  position: relative;
  overflow: hidden;
  line-height: 1;
}

.table-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  opacity: 0;
  transition: var(--smooth);
}

.table-cell:hover {
  border-color: var(--green-dim);
  color: var(--text-2);
  transform: scale(1.05);
}

.table-cell.selected {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-muted);
  box-shadow: var(--green-glow);
}
.table-cell.selected::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, var(--green-muted), transparent);
}

.table-cell.learned {
  border-color: #1e3a2a;
  color: #2d6b45;
  background: #0a1f13;
}
.table-cell.learned.selected {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-muted);
}

/* Panel footer */
.panel-footer {
  padding: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.selected-info {
  font-size: 12px;
  color: var(--text-3);
  text-align: center;
}
.selected-info strong { color: var(--green); font-size: 14px; font-weight: 700; }

.btn-start {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--smooth);
  position: relative;
  overflow: hidden;
}
.btn-start:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px #00ff8844;
}
.btn-start:active { transform: translateY(0); }
.btn-start:disabled {
  background: var(--bg-card);
  color: var(--text-3);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* =============================================
   MAIN ARENA
   ============================================= */
.main-arena {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Home / Idle screen */
.home-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
  text-align: center;
}

.home-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text-1);
}
.home-title .accent { color: var(--green); }

.home-sub {
  font-size: 14px;
  color: var(--text-2);
  max-width: 380px;
  line-height: 1.7;
}

.home-stats {
  display: flex;
  gap: 24px;
  margin-top: 8px;
}
.stat-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  text-align: center;
}
.stat-chip .num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  color: var(--green);
  display: block;
}
.stat-chip .lbl {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hint-arrow {
  font-size: 13px;
  color: var(--text-3);
  animation: pulse-hint 2s ease-in-out infinite;
}
@keyframes pulse-hint {
  0%, 100% { opacity: 0.4; transform: translateX(0); }
  50% { opacity: 0.9; transform: translateX(-6px); }
}

/* =============================================
   QUESTION ARENA — Active session
   ============================================= */
.session-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Progress bar (top) */
.session-progress-bar {
  height: 3px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}
.session-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width 0.3s ease;
}

/* Session header */
.session-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
}

.session-meta {
  display: flex;
  gap: 24px;
  align-items: center;
}
.meta-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-3);
}
.meta-chip .val {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-2);
}
.meta-chip.green .val { color: var(--green); }
.meta-chip.red .val { color: var(--red); }
.meta-chip.amber .val { color: var(--amber); }

/* Timer */
.timer-ring-wrap {
  position: relative;
  width: 52px;
  height: 52px;
}
.timer-ring {
  transform: rotate(-90deg);
  width: 52px;
  height: 52px;
}
.timer-ring-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 3;
}
.timer-ring-fill {
  fill: none;
  stroke: var(--green);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 138.2;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.1s linear, stroke 0.2s ease;
}
.timer-ring-fill.warning { stroke: var(--amber); }
.timer-ring-fill.danger  { stroke: var(--red); }
.timer-num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  color: var(--text-1);
}

/* QUESTION DISPLAY */
.question-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.question-type-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-3);
  margin-bottom: 20px;
  font-weight: 500;
  animation: fadeUp 0.3s ease;
}

.question-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(56px, 9vw, 100px);
  letter-spacing: -1px;
  color: var(--green);
  text-shadow: var(--green-glow);
  animation: questionPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  line-height: 1.05;
  text-align: center;
}

@keyframes questionPop {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  from { transform: translateY(6px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* Answer input */
.answer-zone {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 32px;
}
.answer-input-wrap {
  position: relative;
}
.answer-input {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-1);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 30px;
  width: 190px;
  text-align: center;
  padding: 14px 16px;
  outline: none;
  transition: var(--smooth);
  letter-spacing: 0;
}
.answer-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-muted), var(--green-glow);
}
.answer-input.correct {
  border-color: var(--green);
  background: var(--green-muted);
  animation: correctPulse 0.4s ease;
}
.answer-input.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  animation: shake 0.35s ease;
}
.answer-input.timeout {
  border-color: var(--amber);
  background: var(--amber-dim);
}

@keyframes correctPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%  { transform: translateX(-8px); }
  40%  { transform: translateX(8px); }
  60%  { transform: translateX(-5px); }
  80%  { transform: translateX(5px); }
}

/* Answer feedback flash */
.feedback-flash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: var(--radius);
  opacity: 0;
  transition: opacity 0.1s;
}
.feedback-flash.correct { background: var(--green-muted); opacity: 1; animation: flashOut 0.4s ease forwards; }
.feedback-flash.wrong   { background: var(--red-dim);    opacity: 1; animation: flashOut 0.4s ease forwards; }
@keyframes flashOut { to { opacity: 0; } }

/* Combo */
.combo-display {
  position: absolute;
  top: 20px;
  right: 24px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0;
  transform: scale(0.8);
  transition: var(--spring);
}
.combo-display.visible {
  opacity: 1;
  transform: scale(1);
}
.combo-display .combo-num {
  font-size: 28px;
  display: block;
  line-height: 1;
  text-shadow: 0 0 20px #ffaa0066;
}

/* Q counter strip */
.q-strip {
  display: flex;
  gap: 3px;
  padding: 12px 32px;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.q-dot {
  width: 20px;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  flex-shrink: 0;
  transition: var(--smooth);
}
.q-dot.correct { background: var(--green); }
.q-dot.wrong   { background: var(--red); }
.q-dot.timeout { background: var(--amber); }
.q-dot.active  { background: var(--text-2); animation: dotPulse 0.8s ease-in-out infinite; }
@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* =============================================
   NUMPAD (mobile)
   ============================================= */
.numpad {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
}
.numpad-btn {
  padding: 18px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-1);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  cursor: pointer;
  transition: var(--fast);
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.numpad-btn:active { background: var(--bg-hover); transform: scale(0.95); }
.numpad-btn.zero   { grid-column: span 2; }
.numpad-btn.del    { color: var(--red); }
.numpad-btn.enter  { background: var(--green); color: #000; font-weight: 800; }
.numpad-btn.enter:active { background: var(--green-dim); }

/* =============================================
   SCORE / RESULTS SCREEN
   ============================================= */
.results-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  padding: 40px 32px;
}

.results-header {
  text-align: center;
  margin-bottom: 32px;
}
.results-score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
  position: relative;
}
.results-score-ring svg { transform: rotate(-90deg); width: 140px; height: 140px; }
.results-score-num {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.results-score-num .big {
  font-weight: 700;
  font-size: 40px;
  color: var(--green);
  line-height: 1;
}
.results-score-num .small {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.results-title {
  font-weight: 700;
  font-size: 24px;
  color: var(--text-1);
  margin-bottom: 4px;
}
.results-sub { font-size: 13px; color: var(--text-2); }

/* Stats grid */
.results-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 680px;
  margin-bottom: 28px;
}
.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.result-stat .r-val {
  font-weight: 700;
  font-size: 26px;
  display: block;
  margin-bottom: 4px;
}
.result-stat .r-lbl {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
}

/* Q breakdown */
.q-breakdown {
  width: 100%;
  max-width: 680px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.q-breakdown-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
}
.q-list {
  max-height: 220px;
  overflow-y: auto;
}
.q-row {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background 0.1s;
}
.q-row:last-child { border-bottom: none; }
.q-row:hover { background: var(--bg-hover); }
.q-row .q-idx { color: var(--text-3); font-size: 11px; }
.q-row .q-expr { color: var(--text-2); font-family: var(--font-display); font-weight: 700; }
.q-row .q-ans { color: var(--text-1); font-weight: 600; }
.q-row .q-status { font-size: 14px; }

/* Results actions */
.results-actions {
  display: flex;
  gap: 12px;
}
.btn-retry, .btn-home {
  padding: 12px 28px;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--smooth);
  border: none;
}
.btn-retry {
  background: var(--green);
  color: #000;
}
.btn-retry:hover { box-shadow: 0 4px 20px #00ff8844; transform: translateY(-1px); }
.btn-home {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-2);
}
.btn-home:hover { border-color: var(--text-3); color: var(--text-1); }

/* =============================================
   COMING SOON — Overlay content
   ============================================= */
.coming-soon-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  padding: 40px;

  font-weight: 800;
  font-size: 28px;

// ===== QUESTION GENERATOR =====
// =============================================
// BEAUTY & THE MATHS — Question Generator
// Core algorithm for 90-question sessions
// =============================================

/**
 * Session structure:
 *  - 50 questions: products of selected 2 tables (multiplication)
 *  - 40 questions: mixed addition, subtraction, AND cross-products
 *
 * Weights ensure even coverage and no boring repetition.
 * Fisher-Yates shuffle used throughout.
 */

const TABLES_RANGE = [2, 100];
const MULT_RANGE = [1, 12]; // multiplier range per table

// ---- Utilities ----
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---- Question factories ----

/** Multiplication: tableNum × n */
function makeMultQ(tableNum, n) {
  const ans = tableNum * n;
  return {
    type: 'mult',
    expr: `${tableNum} × ${n}`,
    a: tableNum, op: '×', b: n,
    answer: ans,
    display: `${tableNum} × ${n} = ?`,
    tableTag: `${tableNum}×`,
  };
}

/** Addition within a table context: e.g. tableNum×a + tableNum×b simplified, or plain */
function makeAddQ(maxVal = 200) {
  const a = randInt(2, maxVal);
  const b = randInt(2, maxVal);
  return {
    type: 'add',
    expr: `${a} + ${b}`,
    a, op: '+', b,
    answer: a + b,
    display: `${a} + ${b} = ?`,
    tableTag: null,
  };
}

/** Subtraction (always positive result) */
function makeSubQ(maxVal = 200) {
  let a = randInt(2, maxVal);
  let b = randInt(2, maxVal);
  if (b > a) [a, b] = [b, a];
  return {
    type: 'sub',
    expr: `${a} − ${b}`,
    a, op: '−', b,
    answer: a - b,
    display: `${a} − ${b} = ?`,
    tableTag: null,
  };
}

/** Cross-product: t1 × n + t2 × m style (bonus complexity) */
function makeCrossQ(t1, t2) {
  const n = randInt(1, 12);
  const m = randInt(1, 12);
  const a = t1 * n;
  const b = t2 * m;
  const ops = ['+', '−'];
  const op = ops[randInt(0, 1)];
  const answer = op === '+' ? a + b : Math.abs(a - b);
  const expr = op === '+' ? `${a} + ${b}` : `${Math.max(a,b)} − ${Math.min(a,b)}`;
  return {
    type: 'cross',
    expr,
    a: op === '+' ? a : Math.max(a,b),
    op,
    b: op === '+' ? b : Math.min(a,b),
    answer,
    display: expr + ' = ?',
    tableTag: `${t1}×+${t2}×`,
  };
}

// =============================================
// MAIN GENERATOR
// =============================================

/**
 * generateSession(t1, t2)
 * Returns array of 90 question objects.
 *
 * Breakdown:
 *   Block A (50q): pure multiplication of t1 and t2
 *     - 25 from t1 (all 12 multiples + 13 random re-hits weighted to hard ones)
 *     - 25 from t2 (same)
 *   Block B (40q): mixed
 *     - 12 addition
 *     - 12 subtraction
 *     - 16 cross/mixed involving t1 and t2
 */
function generateSession(t1, t2) {
  const questions = [];

  // ---- Block A: 50 multiplication ----
  // All 12 standard multiples for each table, then fill to 25 with hard ones (7-12)
  function multBlock(tNum, count) {
    const pool = [];
    // All 12 first
    for (let n = 1; n <= 12; n++) pool.push(makeMultQ(tNum, n));
    shuffle(pool);

    // Fill remaining with harder multipliers (7-12 weighted)
    const hardPool = [];
    for (let extra = 0; extra < count - 12; extra++) {
      hardPool.push(makeMultQ(tNum, randInt(7, 12)));
    }
    return shuffle([...pool, ...hardPool]).slice(0, count);
  }

  const blockA = shuffle([...multBlock(t1, 25), ...multBlock(t2, 25)]);
  questions.push(...blockA);

  // ---- Block B: 40 mixed ----
  const blockB = [];

  // 12 addition
  for (let i = 0; i < 12; i++) {
    // Mix: some involve multiples of tables
    if (i < 6) {
      // plain addition up to ~200
      blockB.push(makeAddQ(150));
    } else {
      // addition using table products
      const n1 = randInt(1, 12), n2 = randInt(1, 12);
      const a = t1 * n1, b = t2 * n2;
      blockB.push({
        type: 'add', expr: `${a} + ${b}`,
        a, op: '+', b, answer: a + b,
        display: `${a} + ${b} = ?`, tableTag: `${t1}×${t2}×`
      });
    }
  }

  // 12 subtraction
  for (let i = 0; i < 12; i++) {
    if (i < 6) {
      blockB.push(makeSubQ(150));
    } else {
      const n1 = randInt(1, 12), n2 = randInt(1, 12);
      const raw = [t1 * n1, t2 * n2];
      raw.sort((a, b) => b - a);
      blockB.push({
        type: 'sub', expr: `${raw[0]} − ${raw[1]}`,
        a: raw[0], op: '−', b: raw[1], answer: raw[0] - raw[1],
        display: `${raw[0]} − ${raw[1]} = ?`, tableTag: `${t1}×${t2}×`
      });
    }
  }

  // 16 cross/mixed
  for (let i = 0; i < 16; i++) {
    blockB.push(makeCrossQ(t1, t2));
  }

  questions.push(...shuffle(blockB));

  // Final: tag each with index and blank user fields
  return questions.map((q, i) => ({
    ...q,
    index: i,
    userAnswer: null,
    isCorrect: null,
    timeTaken: null,
    timedOut: false,
  }));
}

/**
 * scoreSession(questions)
 * Returns score object with full analytics.
 */
function scoreSession(questions) {
  const total = questions.length;
  let correct = 0, wrong = 0, timeouts = 0;
  let totalTime = 0;
  const byType = { mult: { c: 0, t: 0 }, add: { c: 0, t: 0 }, sub: { c: 0, t: 0 }, cross: { c: 0, t: 0 } };

  questions.forEach(q => {
    if (q.timedOut) {
      timeouts++;
    } else if (q.isCorrect) {
      correct++;
    } else {
      wrong++;
    }
    if (q.timeTaken != null) totalTime += q.timeTaken;
    const bt = byType[q.type] || { c: 0, t: 0 };
    bt.t++;
    if (q.isCorrect) bt.c++;
    byType[q.type] = bt;
  });

  const accuracy = Math.round((correct / total) * 100);
  const avgTime = totalTime > 0 ? (totalTime / total / 1000).toFixed(1) : '--';

  // Score: 100 base * accuracy * speed bonus
  const speedBonus = avgTime !== '--' ? Math.max(1, (10 - parseFloat(avgTime)) / 10) : 1;
  const finalScore = Math.round(accuracy * speedBonus);

  let grade = 'F';
  if (finalScore >= 95) grade = 'S+';
  else if (finalScore >= 85) grade = 'A';
  else if (finalScore >= 70) grade = 'B';
  else if (finalScore >= 55) grade = 'C';
  else if (finalScore >= 40) grade = 'D';

  let title = 'Keep Going';
  if (grade === 'S+') title = 'LIGHTNING MASTER ⚡';
  else if (grade === 'A') title = 'Sharp & Fast 🎯';
  else if (grade === 'B') title = 'Good Momentum 💪';
  else if (grade === 'C') title = 'Building Up ⚙️';
  else title = 'Rise Tomorrow 🌅';

  return {
    total, correct, wrong, timeouts,
    accuracy, avgTime, finalScore, grade, title,
    byType,
    questions,
  };
}

/**
 * getComboMessage(streak)
 * Returns motivational text for combo streaks.
 */
function getComboMessage(streak) {
  if (streak >= 10) return { label: 'UNSTOPPABLE', emoji: '⚡' };
  if (streak >= 7)  return { label: 'ON FIRE',     emoji: '🔥' };
  if (streak >= 5)  return { label: 'COMBO',       emoji: '✨' };
  if (streak >= 3)  return { label: 'STREAK',      emoji: '💥' };
  return null;
}

const KEYS = {

  STREAK:      'batm_streak',

// ---- Progress ----
function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(KEYS.PROGRESS)) || {};
  } catch { return {}; }
}

function saveProgress(data) {
  localStorage.setItem(KEYS.PROGRESS, JSON.stringify(data));
}

// ---- Streak ----
function loadStreak() {
  try {
    return JSON.parse(localStorage.getItem(KEYS.STREAK)) || { count: 0, lastDate: null };
  } catch { return { count: 0, lastDate: null }; }
}

function updateStreak() {
  const today = new Date().toDateString();
  const streak = loadStreak();

  if (streak.lastDate === today) return streak; // already logged today

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);

  if (streak.lastDate === yesterday.toDateString()) {
    streak.count += 1;
  } else if (streak.lastDate !== today) {
    streak.count = 1; // reset
  }

  streak.lastDate = today;
  localStorage.setItem(KEYS.STREAK, JSON.stringify(streak));
  return streak;
}

// ---- Learned Tables ----
function loadLearnedTables() {
  try {
    return JSON.parse(localStorage.getItem(KEYS.LEARNED)) || [];
  } catch { return []; }
}

function saveLearnedTables(tables) {
  localStorage.setItem(KEYS.LEARNED, JSON.stringify(tables));
}

// ---- Session History ----
function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(KEYS.HISTORY)) || [];
  } catch { return []; }
}

function saveSessionResult(result) {
  const history = loadHistory();
  history.unshift({
    date: new Date().toISOString(),
    tables: result.tables,
    score: result.finalScore,
    accuracy: result.accuracy,
    grade: result.grade,
    avgTime: result.avgTime,
    correct: result.correct,
    total: result.total,
  });
  // Keep last 30 sessions
  localStorage.setItem(KEYS.HISTORY, JSON.stringify(history.slice(0, 30)));
  updateStreak();
}

function getTodaySessionCount() {
  const history = loadHistory();
  const today = new Date().toDateString();
  return history.filter(s => new Date(s.date).toDateString() === today).length;
}

// BEAUTY & THE MATHS — Sound Engine
// Web Audio API — no external files needed
// =============================================

let ctx = null;

function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

function play(freq, type, duration, gainVal = 0.15, fadeOut = true) {
  try {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(gainVal, ac.currentTime);
    if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

  const circumference = 283;
  const offset = circumference - (r.accuracy / 100) * circumference;
  const gradeColor = { 'S+': '#00ff88', A: '#00ff88', B: '#4488ff', C: '#ffaa00', D: '#ff8844', F: '#ff4466' }[r.grade] || '#888';

  const qRows = r.questions.map((q, i) => `
    <div class="q-row">
      <span class="q-idx">${i + 1}</span>
      <span class="q-expr">${q.expr}</span>
      <span class="q-ans">${q.timedOut ? `—` : `${q.userAnswer}`} <span style="color:var(--text-3);font-size:11px">(${q.answer})</span></span>
      <span class="q-status">${q.timedOut ? '⏱' : q.isCorrect ? '✅' : '❌'}</span>
    </div>
  `).join('');

  return `
    <div class="results-screen">
      <div class="results-header">
        <div class="results-score-ring">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border)" stroke-width="6"/>
            <circle cx="50" cy="50" r="45" fill="none"
              stroke="${gradeColor}" stroke-width="6"
              stroke-linecap="round"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"
              style="filter: drop-shadow(0 0 8px ${gradeColor}55)"/>
          </svg>
          <div class="results-score-num">
            <span class="big" style="color:${gradeColor}">${r.grade}</span>
            <span class="small">${r.finalScore}pts</span>
          </div>
        </div>
        <div class="results-title">${r.title}</div>
        <div class="results-sub">Tables ${state.selectedTables.join(' & ')}× · ${new Date().toLocaleDateString()}</div>
      </div>

      <div class="results-stats">
        <div class="result-stat">
          <span class="r-val" style="color:var(--green)">${r.correct}</span>
          <span class="r-lbl">Correct</span>
        </div>
        <div class="result-stat">
          <span class="r-val" style="color:var(--red)">${r.wrong}</span>
          <span class="r-lbl">Wrong</span>
        </div>
        <div class="result-stat">
          <span class="r-val" style="color:var(--amber)">${r.timeouts}</span>
          <span class="r-lbl">Timeouts</span>
        </div>
        <div class="result-stat">
          <span class="r-val" style="color:var(--blue)">${r.avgTime}s</span>
          <span class="r-lbl">Avg Speed</span>
        </div>
      </div>

      <div class="q-breakdown">
        <div class="q-breakdown-header">Question Breakdown</div>
        <div class="q-list">${qRows}</div>
      </div>

      <div class="results-actions">
        <button class="btn-retry" id="btn-retry">⚡ Go Again</button>
        <button class="btn-home" id="btn-home">← Home</button>
      </div>
    </div>
  `;
}

function renderComingSoon() {
  const labels = { Progress:'📈', Leaderboard:'🏆', Challenges:'⚔️', Stats:'📊' };
  const label = state.comingLabel || 'Feature';
  return `
    <div class="coming-soon-page">
      <div class="cs-icon">${labels[label] || '🚀'}</div>
      <div class="cs-title">${label}</div>
      <div class="cs-sub">This feature is being crafted with the same obsession as the questions. Coming soon.</div>
    </div>
  `;
}

// =============================================
// SESSION ENGINE
// =============================================
function startSession() {
  if (state.selectedTables.length !== 2) return;
  const [t1, t2] = state.selectedTables;
  state.questions = generateSession(t1, t2);
  state.currentQ = 0;
  state.combo = 0;
  state.page = 'session';
  renderApp();
  setTimeout(() => {
    sounds.sessionStart();
    focusInput();
    startTimer();
  }, 100);
}

function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = QUESTION_TIME;
  updateTimerUI();

  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();

    if (state.timeLeft <= 3 && state.timeLeft > 0) {
      sounds.tick();
    }

    if (state.timeLeft <= 0) {
      onTimeout();
    }
  }, 1000);
}

function onTimeout() {
  clearInterval(state.timer);
  const q = state.questions[state.currentQ];
  q.timedOut = true;
  q.isCorrect = false;
  q.timeTaken = QUESTION_TIME * 1000;
  state.combo = 0;
  sounds.timeout();
  flashInput('timeout');
  setTimeout(advanceQuestion, 600);
}

function submitAnswer() {
  const input = document.getElementById('answer-input');
  const val = input ? parseInt(input.value || state.pendingInput, 10) : parseInt(state.pendingInput, 10);
  if (isNaN(val)) return;

  clearInterval(state.timer);
  const q = state.questions[state.currentQ];
  const timeTaken = (QUESTION_TIME - state.timeLeft) * 1000;
  q.userAnswer = val;
  q.timeTaken = timeTaken;
  q.isCorrect = val === q.answer;

  if (q.isCorrect) {
    state.combo++;
    sounds.correct();
    if (state.combo >= 3) sounds.combo();
    flashInput('correct');
  } else {
    state.combo = 0;
    sounds.wrong();
    flashInput('wrong');
  }

  setTimeout(advanceQuestion, 350);
}

function advanceQuestion() {
  state.currentQ++;

  if (state.currentQ >= TOTAL_QUESTIONS) {
    endSession();
    return;
  }

  state.pendingInput = '';
  updateSessionUI();
  focusInput();
  startTimer();
}

function endSession() {
  const score = scoreSession(state.questions);
  score.tables = state.selectedTables;
  state.results = score;

  // Mark tables as learned
  const newLearned = new Set([...state.learnedTables, ...state.selectedTables]);
  state.learnedTables = [...newLearned];
  saveLearnedTables(state.learnedTables);
  saveSessionResult(score);

  state.streak = loadStreak().count;
  sounds.sessionEnd();
  state.page = 'results';
  renderApp();
}

// =============================================
// UI UPDATES (partial — avoid full re-render)
// =============================================
function updateSessionUI() {
  const q = state.questions[state.currentQ];
  if (!q) return;

  // Question text
  const qt = document.getElementById('question-text');
  if (qt) {
    qt.innerHTML = `${q.display.replace('= ?', '')}<span style="color:var(--text-3)">= ?</span>`;
    qt.style.animation = 'none';
    qt.offsetHeight; // reflow
    qt.style.animation = '';
  }

  // Clear input
  const input = document.getElementById('answer-input');
  if (input) { input.value = ''; input.className = 'answer-input'; }
  // Clear mobile display
  const mobileAns = document.getElementById('mobile-ans-val');
  if (mobileAns) { mobileAns.textContent = '_'; mobileAns.className = 'ans-val'; }
  const mobileDisp = document.getElementById('mobile-ans-display');
  if (mobileDisp) mobileDisp.style.display = '';

  // Progress
  const fill = document.querySelector('.session-progress-fill');
  if (fill) fill.style.width = `${(state.currentQ / TOTAL_QUESTIONS) * 100}%`;

  // q strip dots
  const dots = document.querySelectorAll('.q-dot');
  dots.forEach((dot, i) => {
    const sq = state.questions[i];
    dot.className = 'q-dot' +
      (i === state.currentQ ? ' active' : '') +
      (sq.isCorrect === true ? ' correct' : '') +
      (sq.timedOut ? ' timeout' : '') +
      (sq.isCorrect === false && !sq.timedOut ? ' wrong' : '');
  });

  // Meta chips
  const metaChips = document.querySelectorAll('.meta-chip .val');
  if (metaChips[0]) metaChips[0].textContent = `${state.currentQ + 1}/${TOTAL_QUESTIONS}`;
  if (metaChips[1]) metaChips[1].textContent = state.questions.filter(q=>q.isCorrect).length;
  if (metaChips[2]) metaChips[2].textContent = state.questions.filter(q=>q.isCorrect===false||q.timedOut).length;

  // Combo
  const combo = document.getElementById('combo-display');
  if (combo) {
    const msg = getComboMessage(state.combo);
    if (msg && state.combo >= 3) {
      combo.className = 'combo-display visible';
      combo.innerHTML = `<span class="combo-num">×${state.combo}</span>${msg.label}`;
    } else {
      combo.className = 'combo-display';
    }
  }

  // Type tag
  const typeEl = document.querySelector('.question-type-tag');
  if (typeEl) {
    const typeLabel = { mult: '✕ Multiplication', add: '+ Addition', sub: '− Subtraction', cross: '⊕ Mixed' }[q.type] || '';
    typeEl.textContent = typeLabel;
  }
}

function updateTimerUI() {
  const circumference = 138.2;
  const offset = circumference - (state.timeLeft / QUESTION_TIME) * circumference;
  const fill = document.querySelector('.timer-ring-fill');
  const num = document.querySelector('.timer-num');

  if (fill) {
    fill.style.strokeDashoffset = offset;
    fill.className = 'timer-ring-fill' +
      (state.timeLeft <= 3 ? ' danger' : state.timeLeft <= 5 ? ' warning' : '');
  }
  if (num) num.textContent = state.timeLeft;
}

function flashInput(type) {
  const input = document.getElementById('answer-input');
  if (input) {
    input.className = `answer-input ${type}`;
    setTimeout(() => { if (input) input.className = 'answer-input'; }, 350);
  }
  const mobileAns = document.getElementById('mobile-ans-val');
  if (mobileAns) {
    mobileAns.className = `ans-val ${type}`;
    setTimeout(() => { if (mobileAns) mobileAns.className = 'ans-val'; }, 350);
  }
}

function focusInput() {
  if (!state.isMobile) {
    const input = document.getElementById('answer-input');
    if (input) input.focus();
  }
}

// =============================================
// EVENTS
// =============================================
function bindGlobalEvents() {
  window.addEventListener('resize', () => {
    state.isMobile = window.innerWidth <= 768;
  });

  document.addEventListener('keydown', (e) => {
    if (state.page !== 'session') return;
    if (e.key === 'Enter') submitAnswer();
  });
}

function bindEvents() {
  // Navbar page navigation
  document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.page;
      if (page === 'coming') {
        state.comingLabel = btn.dataset.label;
        state.page = 'coming';
      } else {
        state.page = page;
      }
      if (state.page !== 'session') clearInterval(state.timer);
      updateMainContent();
      updateNavActive();
    });
  });

  // Mobile menu
  const mobileBtn = document.getElementById('mobile-menu-btn');
  if (mobileBtn) {
    mobileBtn.addEventListener('click', () => {
      state.panelOpen = !state.panelOpen;
      const panel = document.getElementById('side-panel');
      const overlay = document.getElementById('panel-overlay');
      if (panel) panel.classList.toggle('open', state.panelOpen);
      if (overlay) overlay.classList.toggle('show', state.panelOpen);
    });
  }
  // Close panel on overlay tap
  const overlay = document.getElementById('panel-overlay');
  if (overlay) {
    overlay.addEventListener('click', () => {
      state.panelOpen = false;
      const panel = document.getElementById('side-panel');
      if (panel) panel.classList.remove('open');
      overlay.classList.remove('show');
    });
  }

  // Table cells
  document.querySelectorAll('.table-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const num = parseInt(cell.dataset.table, 10);
      const idx = state.selectedTables.indexOf(num);

      if (idx >= 0) {
        state.selectedTables.splice(idx, 1);
      } else {
        if (state.selectedTables.length >= 2) state.selectedTables.shift();
        state.selectedTables.push(num);
      }

      updateSidePanel();
    });
  });

  // Start button
  const startBtn = document.getElementById('btn-start');
  if (startBtn) {
    startBtn.addEventListener('click', () => {
      if (state.selectedTables.length === 2) {
        state.panelOpen = false;
        startSession();
      }
    });
  }

  // Answer input
  const answerInput = document.getElementById('answer-input');
  if (answerInput) {
    answerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
  }

  // Mobile numpad
  document.querySelectorAll('.numpad-btn[data-num]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.pendingInput = (state.pendingInput + btn.dataset.num).slice(0, 5);
      const input = document.getElementById('answer-input');
      if (input) input.value = state.pendingInput;
      const mobileAns = document.getElementById('mobile-ans-val');
      if (mobileAns) mobileAns.textContent = state.pendingInput || '_';
    });
  });

  const npDel = document.getElementById('np-del');
  if (npDel) {
    npDel.addEventListener('click', () => {
      state.pendingInput = state.pendingInput.slice(0, -1);
      const input = document.getElementById('answer-input');
      if (input) input.value = state.pendingInput;
      const mobileAns = document.getElementById('mobile-ans-val');
      if (mobileAns) mobileAns.textContent = state.pendingInput || '_';
    });
  }

  const npEnter = document.getElementById('np-enter');
  if (npEnter) npEnter.addEventListener('click', submitAnswer);

  // Results actions
  const retryBtn = document.getElementById('btn-retry');
  if (retryBtn) retryBtn.addEventListener('click', () => {
    state.page = 'home';
    state.results = null;
    updateMainContent();
    startSession();
  });

  const homeBtn = document.getElementById('btn-home');
  if (homeBtn) homeBtn.addEventListener('click', () => {
    state.page = 'home';
    state.results = null;
    updateMainContent();
    updateNavActive();
  });
}

function updateMainContent() {
  const arena = document.getElementById('main-arena');
  if (arena) arena.innerHTML = renderMainContent();
  bindEvents();
}

function updateNavActive() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === state.page);
  });
}

function updateSidePanel() {
  const panel = document.getElementById('side-panel');
  if (!panel) return;
  panel.outerHTML = renderSidePanel();
  // Re-bind (outerHTML replaces node)
  bindEvents();
}

// BOOT
// =============================================
init();
