  <style>
/* =============================================
   BEAUTY & THE MATHS — Design System
   ============================================= */

:root {
  /* Core Palette */
  --bg:          #080c10;
  --bg-panel:    #0d1219;
  --bg-card:     #111820;
  --bg-hover:    #161f2a;
  --border:      #1e2d3d;
  --border-glow: #00ff8833;

  /* Greens — primary action/focus */
  --green:       #00ff88;
  --green-dim:   #00cc6a;
  --green-muted: #00ff8818;
  --green-glow:  0 0 20px #00ff8844, 0 0 60px #00ff8811;

  /* Text */
  --text-1:  #f0f6ff;
  --text-2:  #8899aa;
  --text-3:  #4a5a6a;

  /* State colors */
  --red:     #ff4466;
  --red-dim: #ff446622;
  --amber:   #ffaa00;
  --amber-dim: #ffaa0022;
  --blue:    #4488ff;

  /* Typography — WhatsApp system font stack for max readability */
  --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono:    -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-nums:    "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

  /* Spacing */
  --nav-h: 56px;
  --panel-w: 300px;
  --radius: 10px;
  --radius-sm: 6px;

  /* Transitions */
  --fast: 80ms ease;
  --smooth: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --spring: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-display);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* =============================================
   LAYOUT
   ============================================= */
#app { height: 100dvh; display: flex; flex-direction: column; }

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* =============================================
   NAVBAR
   ============================================= */
.navbar {
  height: var(--nav-h);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 32px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.navbar-logo {
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
  color: var(--text-1);
  white-space: nowrap;
}
.navbar-logo span { color: var(--green); }

.navbar-nav {
  display: flex;
  gap: 4px;
  flex: 1;
}

.nav-item {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--text-3);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--smooth);
  text-transform: uppercase;
  border: none;
  background: none;
  position: relative;
  font-family: var(--font-display);
}
.nav-item:hover { color: var(--text-2); background: var(--bg-hover); }
.nav-item.active { color: var(--green); }
.nav-item.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--green);
  border-radius: 1px;
}
.nav-item .badge {
  font-size: 9px;
  background: var(--bg-card);
  color: var(--text-3);
  padding: 2px 5px;
  border-radius: 3px;
  margin-left: 4px;
  border: 1px solid var(--border);
}

.navbar-right {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
}

/* Streak */
.streak-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 14px;
  cursor: default;
}
.streak-flame {
  font-size: 18px;
  animation: flicker 2s ease-in-out infinite;
}
@keyframes flicker {
  0%, 100% { transform: scaleY(1) rotate(-2deg); }
  50% { transform: scaleY(1.1) rotate(2deg); }
}
.streak-num {
  font-weight: 700;
  font-size: 16px;
  color: var(--amber);
}
.streak-label {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Day badge */
.day-badge {
  font-size: 12px;
  color: var(--text-2);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px;
}
.day-badge span { color: var(--green); font-weight: 700; }

/* =============================================
   SIDE PANEL — Table Selector
   ============================================= */
.side-panel {
  width: var(--panel-w);
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-2);
  margin-bottom: 4px;
}
.panel-subtitle {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}

/* Table Grid — 10 columns, cells 2–100 */
.table-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
}

.table-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 11px;
  border-radius: 5px;
  cursor: pointer;
  transition: var(--smooth);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-3);
  user-select: none;
  position: relative;
  overflow: hidden;
  line-height: 1;
}

.table-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  opacity: 0;
  transition: var(--smooth);
}

.table-cell:hover {
  border-color: var(--green-dim);
  color: var(--text-2);
  transform: scale(1.05);
}

.table-cell.selected {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-muted);
  box-shadow: var(--green-glow);
}
.table-cell.selected::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, var(--green-muted), transparent);
}

.table-cell.learned {
  border-color: #1e3a2a;
  color: #2d6b45;
  background: #0a1f13;
}
.table-cell.learned.selected {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-muted);
}

/* Panel footer */
.panel-footer {
  padding: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.selected-info {
  font-size: 12px;
  color: var(--text-3);
  text-align: center;
}
.selected-info strong { color: var(--green); font-size: 14px; font-weight: 700; }

.btn-start {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--smooth);
  position: relative;
  overflow: hidden;
}
.btn-start:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px #00ff8844;
}
.btn-start:active { transform: translateY(0); }
.btn-start:disabled {
  background: var(--bg-card);
  color: var(--text-3);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* =============================================
   MAIN ARENA
   ============================================= */
.main-arena {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Home / Idle screen */
.home-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
  text-align: center;
}

.home-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: -1px;
  color: var(--text-1);
}
.home-title .accent { color: var(--green); }

.home-sub {
  font-size: 14px;
  color: var(--text-2);
  max-width: 380px;
  line-height: 1.7;
}

.home-stats {
  display: flex;
  gap: 24px;
  margin-top: 8px;
}
.stat-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  text-align: center;
}
.stat-chip .num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  color: var(--green);
  display: block;
}
.stat-chip .lbl {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hint-arrow {
  font-size: 13px;
  color: var(--text-3);
  animation: pulse-hint 2s ease-in-out infinite;
}
@keyframes pulse-hint {
  0%, 100% { opacity: 0.4; transform: translateX(0); }
  50% { opacity: 0.9; transform: translateX(-6px); }
}

/* =============================================
   QUESTION ARENA — Active session
   ============================================= */
.session-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Progress bar (top) */
.session-progress-bar {
  height: 3px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}
.session-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width 0.3s ease;
}

/* Session header */
.session-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
}

.session-meta {
  display: flex;
  gap: 24px;
  align-items: center;
}
.meta-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-3);
}
.meta-chip .val {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-2);
}
.meta-chip.green .val { color: var(--green); }
.meta-chip.red .val { color: var(--red); }
.meta-chip.amber .val { color: var(--amber); }

/* Timer */
.timer-ring-wrap {
  position: relative;
  width: 52px;
  height: 52px;
}
.timer-ring {
  transform: rotate(-90deg);
  width: 52px;
  height: 52px;
}
.timer-ring-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 3;
}
.timer-ring-fill {
  fill: none;
  stroke: var(--green);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 138.2;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.1s linear, stroke 0.2s ease;
}
.timer-ring-fill.warning { stroke: var(--amber); }
.timer-ring-fill.danger  { stroke: var(--red); }
.timer-num {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  color: var(--text-1);
}

/* QUESTION DISPLAY */
.question-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.question-type-tag {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-3);
  margin-bottom: 20px;
  font-weight: 500;
  animation: fadeUp 0.3s ease;
}

.question-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(56px, 9vw, 100px);
  letter-spacing: -1px;
  color: var(--green);
  text-shadow: var(--green-glow);
  animation: questionPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  line-height: 1.05;
  text-align: center;
}

@keyframes questionPop {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes fadeUp {
  from { transform: translateY(6px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* Answer input */
.answer-zone {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 32px;
}
.answer-input-wrap {
  position: relative;
}
.answer-input {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-1);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 30px;
  width: 190px;
  text-align: center;
  padding: 14px 16px;
  outline: none;
  transition: var(--smooth);
  letter-spacing: 0;
}
.answer-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-muted), var(--green-glow);
}
.answer-input.correct {
  border-color: var(--green);
  background: var(--green-muted);
  animation: correctPulse 0.4s ease;
}
.answer-input.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  animation: shake 0.35s ease;
}
.answer-input.timeout {
  border-color: var(--amber);
  background: var(--amber-dim);
}

@keyframes correctPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%  { transform: translateX(-8px); }
  40%  { transform: translateX(8px); }
  60%  { transform: translateX(-5px); }
  80%  { transform: translateX(5px); }
}

/* Answer feedback flash */
.feedback-flash {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: var(--radius);
  opacity: 0;
  transition: opacity 0.1s;
}
.feedback-flash.correct { background: var(--green-muted); opacity: 1; animation: flashOut 0.4s ease forwards; }
.feedback-flash.wrong   { background: var(--red-dim);    opacity: 1; animation: flashOut 0.4s ease forwards; }
@keyframes flashOut { to { opacity: 0; } }

/* Combo */
.combo-display {
  position: absolute;
  top: 20px;
  right: 24px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0;
  transform: scale(0.8);
  transition: var(--spring);
}
.combo-display.visible {
  opacity: 1;
  transform: scale(1);
}
.combo-display .combo-num {
  font-size: 28px;
  display: block;
  line-height: 1;
  text-shadow: 0 0 20px #ffaa0066;
}

/* Q counter strip */
.q-strip {
  display: flex;
  gap: 3px;
  padding: 12px 32px;
  overflow-x: auto;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.q-dot {
  width: 20px;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  flex-shrink: 0;
  transition: var(--smooth);
}
.q-dot.correct { background: var(--green); }
.q-dot.wrong   { background: var(--red); }
.q-dot.timeout { background: var(--amber); }
.q-dot.active  { background: var(--text-2); animation: dotPulse 0.8s ease-in-out infinite; }
@keyframes dotPulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* =============================================
   NUMPAD (mobile)
   ============================================= */
.numpad {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 12px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
}
.numpad-btn {
  padding: 18px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-1);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  cursor: pointer;
  transition: var(--fast);
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.numpad-btn:active { background: var(--bg-hover); transform: scale(0.95); }
.numpad-btn.zero   { grid-column: span 2; }
.numpad-btn.del    { color: var(--red); }
.numpad-btn.enter  { background: var(--green); color: #000; font-weight: 800; }
.numpad-btn.enter:active { background: var(--green-dim); }

/* =============================================
   SCORE / RESULTS SCREEN
   ============================================= */
.results-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  padding: 40px 32px;
}

.results-header {
  text-align: center;
  margin-bottom: 32px;
}
.results-score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
  position: relative;
}
.results-score-ring svg { transform: rotate(-90deg); width: 140px; height: 140px; }
.results-score-num {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.results-score-num .big {
  font-weight: 700;
  font-size: 40px;
  color: var(--green);
  line-height: 1;
}
.results-score-num .small {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.results-title {
  font-weight: 700;
  font-size: 24px;
  color: var(--text-1);
  margin-bottom: 4px;
}
.results-sub { font-size: 13px; color: var(--text-2); }

/* Stats grid */
.results-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 680px;
  margin-bottom: 28px;
}
.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.result-stat .r-val {
  font-weight: 700;
  font-size: 26px;
  display: block;
  margin-bottom: 4px;
}
.result-stat .r-lbl {
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
}

/* Q breakdown */
.q-breakdown {
  width: 100%;
  max-width: 680px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.q-breakdown-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
}
.q-list {
  max-height: 220px;
  overflow-y: auto;
}
.q-row {
  display: grid;
  grid-template-columns: 32px 1fr auto auto;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background 0.1s;
}
.q-row:last-child { border-bottom: none; }
.q-row:hover { background: var(--bg-hover); }
.q-row .q-idx { color: var(--text-3); font-size: 11px; }
.q-row .q-expr { color: var(--text-2); font-family: var(--font-display); font-weight: 700; }
.q-row .q-ans { color: var(--text-1); font-weight: 600; }
.q-row .q-status { font-size: 14px; }

/* Results actions */
.results-actions {
  display: flex;
  gap: 12px;
}
.btn-retry, .btn-home {
  padding: 12px 28px;
  border-radius: var(--radius);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: var(--smooth);
  border: none;
}
.btn-retry {
  background: var(--green);
  color: #000;
}
.btn-retry:hover { box-shadow: 0 4px 20px #00ff8844; transform: translateY(-1px); }
.btn-home {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-2);
}
.btn-home:hover { border-color: var(--text-3); color: var(--text-1); }

/* =============================================
   COMING SOON — Overlay content
   ============================================= */
.coming-soon-page {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 40px;
  text-align: center;
}
.cs-icon { font-size: 56px; }
.cs-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 28px;
  color: var(--text-1);
}
.cs-sub { font-size: 14px; color: var(--text-2); max-width: 320px; line-height: 1.7; }

/* =============================================
   MOBILE — Responsive
   ============================================= */
@media (max-width: 768px) {
  :root { --panel-w: 240px; }

  .navbar { padding: 0 14px; gap: 12px; }
  .navbar-logo { font-size: 15px; }
  .navbar-nav { display: none; }

  .side-panel {
    position: fixed;
    left: 0;
    top: var(--nav-h);
    bottom: 0;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 24px #00000066;
  }
  .side-panel.open { transform: translateX(0); }

  .mobile-menu-btn {
    display: flex !important;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-2);
    font-size: 18px;
  }

  /* Session — mobile layout */
  .session-screen { flex-direction: column; }

  .question-zone {
    flex: 0 0 40%;
    justify-content: center;
  }
  .question-text { font-size: clamp(44px, 15vw, 72px); }

  .q-strip { display: none; }

  .numpad {
    display: grid;
    flex: 0 0 60%;
  }

  .answer-zone { display: none; }

  .results-stats { grid-template-columns: repeat(2, 1fr); }
}

/* Mobile menu button hidden on desktop */
.mobile-menu-btn { display: none; }

/* =============================================
   UTILITY / ANIMATIONS
   ============================================= */
.glow-green { text-shadow: var(--green-glow); }

.scan-line {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green-muted), transparent);
  animation: scan 4s linear infinite;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.3;
}
@keyframes scan {
  from { transform: translateY(0); }
  to   { transform: translateY(100vh); }
}

/* =============================================
   NEW v2 ADDITIONS
   ============================================= */

/* Sound toggle */
.sound-toggle {
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: var(--smooth);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.sound-toggle:hover { background: var(--bg-hover); }

/* Pause button */
.pause-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-2);
  font-size: 16px;
  padding: 6px 10px;
  cursor: pointer;
  transition: var(--smooth);
  -webkit-tap-highlight-color: transparent;
}
.pause-btn:hover { border-color: var(--amber); color: var(--amber); }

.session-header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Q placeholder color */
.q-placeholder { color: var(--text-3); }

/* Hidden on mobile */
.hidden-mobile { }
@media (max-width: 768px) {
  .hidden-mobile { display: none !important; }
}

/* ---- MODALS ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 340px;
  text-align: center;
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.modal-icon { font-size: 40px; margin-bottom: 12px; }
.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 8px;
}
.modal-sub {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 24px;
}
.modal-actions { display: flex; gap: 10px; flex-direction: column; }
.modal-btn {
  padding: 13px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  transition: var(--smooth);
  font-family: var(--font-display);
}
.modal-btn:hover { color: var(--text-1); border-color: var(--text-3); }
.modal-btn.primary { background: var(--green); color: #000; border-color: transparent; font-weight: 700; }
.modal-btn.primary:hover { box-shadow: 0 4px 20px #00ff8844; }
.modal-btn.danger { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.modal-btn.danger:hover { background: var(--red); color: #fff; }

/* ---- COUNTDOWN ---- */
.countdown-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.cd-num {
  font-size: 120px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  text-shadow: var(--green-glow);
  animation: questionPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.cd-label {
  font-size: 14px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ---- STREAK CELEBRATION ---- */
.streak-celebrate {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  animation: slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideDown {
  from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0);     opacity: 1; }
}
.sc-inner {
  background: var(--bg-card);
  border: 1px solid var(--amber);
  border-radius: 100px;
  padding: 10px 24px;
  font-weight: 700;
  font-size: 15px;
  color: var(--amber);
  box-shadow: 0 4px 24px #ffaa0033;
}

/* ---- HOME v2 ---- */
.home-hero { text-align: center; }
.home-title {
  font-weight: 700;
  font-size: clamp(28px, 5vw, 52px);
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: var(--text-1);
  margin-bottom: 12px;
}
.home-title .accent { color: var(--green); }
.home-sub {
  font-size: 14px;
  color: var(--text-2);
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.7;
}

.last-session-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  width: 100%;
  max-width: 420px;
}
.ls-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); margin-bottom: 8px; }
.ls-body { display: flex; align-items: center; gap: 16px; }
.ls-tables { font-weight: 700; font-size: 16px; color: var(--text-1); }
.ls-grade { font-weight: 700; font-size: 22px; }
.ls-acc { font-size: 13px; color: var(--text-2); }
.ls-date { font-size: 12px; color: var(--text-3); margin-left: auto; }

.ready-hint {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--green);
  animation: fadeUp 0.3s ease;
}
.ready-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: dotPulse 1s ease-in-out infinite;
}

.how-it-works {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  padding: 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius);
  max-width: 500px;
}
.hiw-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
.hiw-icon { font-size: 18px; }

/* ---- LEGEND ---- */
.legend-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-3); margin-top: 8px; flex-wrap: wrap;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 2px;
  background: var(--bg-card); border: 1px solid var(--border);
  flex-shrink: 0;
}
.legend-dot.mastered { background: var(--green-muted); border-color: var(--green); }
.legend-dot.practiced { background: #0a1f13; border-color: #1e3a2a; }

/* Table cell states v2 */
.table-cell.mastered {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-muted);
  box-shadow: 0 0 6px #00ff8822;
}
.table-cell.practiced {
  border-color: #1e3a2a;
  color: #2d6b45;
  background: #0a1f13;
}
.table-cell.selected {
  border-color: var(--green) !important;
  color: var(--green) !important;

// ===== PWA INSTALL PROMPT =====
let _dPr = null;

// ===== STORAGE =====
// =============================================
// BEAUTY & THE MATHS — Storage v2
// Rich data model, unlimited sessions, versioned
// =============================================

const KEYS = {
  META:    'batm_meta',
  STREAK:  'batm_streak',
  TABLES:  'batm_tables',
  HISTORY: 'batm_history',
  WRONGS:  'batm_wrongs',
  PREFS:   'batm_prefs',
};

function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.warn('Storage full', e); }
}

// ---- Preferences ----
function loadPrefs() { return load(KEYS.PREFS, { sound: true, haptic: true }); }
function savePrefs(p) { save(KEYS.PREFS, p); }

// ---- Streak ----
function loadStreak() {
  return load(KEYS.STREAK, { count: 0, best: 0, lastDate: null });
}
function updateStreak() {
  const today = new Date().toDateString();
  const s = loadStreak();
  if (s.lastDate === today) return s;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  s.count = s.lastDate === yesterday ? s.count + 1 : 1;
  s.best  = Math.max(s.best || 0, s.count);
  s.lastDate = today;
  save(KEYS.STREAK, s);
  return s;
}

// ---- Table mastery data ----
function loadTableData() { return load(KEYS.TABLES, {}); }
function updateTableData(tableNum, res) {
  const data = loadTableData();
  const t = data[tableNum] || { sessions:0, totalQ:0, correct:0, totalTimeMs:0, lastDate:null, masteryScore:0 };
  t.sessions   += 1;
  t.totalQ     += res.total || 0;
  t.correct    += res.correct || 0;
  t.totalTimeMs += res.totalTimeMs || 0;
  t.lastDate    = new Date().toISOString();
  const acc = t.totalQ > 0 ? t.correct / t.totalQ : 0;
  t.masteryScore = Math.min(100, Math.round(acc * 70 + Math.min(t.sessions, 10) * 3));
  data[tableNum] = t;
  save(KEYS.TABLES, data);
}
function isMastered(tableNum) {
  const t = loadTableData()[tableNum];
  return !!(t && t.masteryScore >= 80 && t.sessions >= 3);
}

// ---- Wrong tracker ----
function recordWrong(expr) {
  const w = load(KEYS.WRONGS, {});
  w[expr] = (w[expr] || 0) + 1;
  save(KEYS.WRONGS, w);
}
function getTopWrongs(n) {
  return Object.entries(load(KEYS.WRONGS, {}))
    .sort((a,b) => b[1]-a[1]).slice(0, n||10)
    .map(([expr,count]) => ({ expr, count }));
}

// ---- Session history ----
function loadHistory() { return load(KEYS.HISTORY, []); }
function saveSessionResult(result) {
  const history = loadHistory();
  const entry = {
    id:          Date.now(),
    date:        new Date().toISOString(),
    tables:      result.tables,
    score:       result.finalScore,
    accuracy:    result.accuracy,
    grade:       result.grade,
    avgTime:     result.avgTime,
    correct:     result.correct,
    wrong:       result.wrong,
    timeouts:    result.timeouts,
    total:       result.total,
    totalTimeMs: result.totalTimeMs || 0,
    byType:      result.byType,
  };
  history.unshift(entry);
  save(KEYS.HISTORY, history.slice(0, 500));
  if (result.tables) result.tables.forEach(t => updateTableData(t, result));
  updateStreak();
  // Track wrong expressions
  if (result.questions) {
    result.questions.filter(q => !q.isCorrect && !q.timedOut)
      .forEach(q => recordWrong(q.expr));
  }
  return entry;
}

// ---- Analytics ----
function getTodaySessionCount() {
  const today = new Date().toDateString();
  return loadHistory().filter(s => new Date(s.date).toDateString() === today).length;
}
function getOverallStats() {
  const history = loadHistory();
  if (!history.length) return null;
  const n = history.length;
  return {
    totalSessions: n,
    avgAccuracy:   Math.round(history.reduce((s,h)=>s+h.accuracy,0)/n),
    avgScore:      Math.round(history.reduce((s,h)=>s+h.score,0)/n),
    bestScore:     Math.max(...history.map(h=>h.score)),
    bestGrade:     history.sort((a,b)=>b.score-a.score)[0]?.grade,
    totalQ:        history.reduce((s,h)=>s+h.total,0),
    totalCorrect:  history.reduce((s,h)=>s+h.correct,0),
    masteredCount: Object.values(loadTableData()).filter(t=>t.masteryScore>=80&&t.sessions>=3).length,
  };
}
function getLast7Days() {
  const history = loadHistory();
  return Array.from({length:7},(_,i)=>{
    const d = new Date(Date.now() - (6-i)*86400000);
    const dateStr = d.toDateString();
    const sessions = history.filter(s=>new Date(s.date).toDateString()===dateStr);
    return {
      label: d.toLocaleDateString('en',{weekday:'short'}),
      sessions: sessions.length,
      avgAccuracy: sessions.length ? Math.round(sessions.reduce((s,h)=>s+h.accuracy,0)/sessions.length) : null,
      avgScore: sessions.length ? Math.round(sessions.reduce((s,h)=>s+h.score,0)/sessions.length) : null,
    };
  });
}


// ===== QUESTION GENERATOR =====
// =============================================
// BEAUTY & THE MATHS — Question Generator
// Core algorithm for 90-question sessions
// =============================================

/**
 * Session structure:
 *  - 50 questions: products of selected 2 tables (multiplication)
 *  - 40 questions: mixed addition, subtraction, AND cross-products
 *
 * Weights ensure even coverage and no boring repetition.
 * Fisher-Yates shuffle used throughout.
 */

const TABLES_RANGE = [2, 100];
const MULT_RANGE = [1, 12]; // multiplier range per table

// ---- Utilities ----
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---- Question factories ----

/** Multiplication: tableNum × n */
function makeMultQ(tableNum, n) {
  const ans = tableNum * n;
  return {
    type: 'mult',
    expr: `${tableNum} × ${n}`,
    a: tableNum, op: '×', b: n,
    answer: ans,
    display: `${tableNum} × ${n} = ?`,
    tableTag: `${tableNum}×`,
  };
}

/** Addition within a table context: e.g. tableNum×a + tableNum×b simplified, or plain */
function makeAddQ(maxVal = 200) {
  const a = randInt(2, maxVal);
  const b = randInt(2, maxVal);
  return {
    type: 'add',
    expr: `${a} + ${b}`,
    a, op: '+', b,
    answer: a + b,
    display: `${a} + ${b} = ?`,
    tableTag: null,
  };
}

/** Subtraction (always positive result) */
function makeSubQ(maxVal = 200) {
  let a = randInt(2, maxVal);
  let b = randInt(2, maxVal);
  if (b > a) [a, b] = [b, a];
  return {
    type: 'sub',
    expr: `${a} − ${b}`,
    a, op: '−', b,
    answer: a - b,
    display: `${a} − ${b} = ?`,
    tableTag: null,
  };
}

/** Cross-product: t1 × n + t2 × m style (bonus complexity) */
function makeCrossQ(t1, t2) {
  const n = randInt(1, 12);
  const m = randInt(1, 12);
  const a = t1 * n;
  const b = t2 * m;
  const ops = ['+', '−'];
  const op = ops[randInt(0, 1)];
  const answer = op === '+' ? a + b : Math.abs(a - b);
  const expr = op === '+' ? `${a} + ${b}` : `${Math.max(a,b)} − ${Math.min(a,b)}`;
  return {
    type: 'cross',
    expr,
    a: op === '+' ? a : Math.max(a,b),
    op,
    b: op === '+' ? b : Math.min(a,b),
    answer,
    display: expr + ' = ?',
    tableTag: `${t1}×+${t2}×`,
  };
}

// =============================================
// MAIN GENERATOR
// =============================================

/**
 * generateSession(t1, t2)
 * Returns array of 90 question objects.
 *
 * Breakdown:
 *   Block A (50q): pure multiplication of t1 and t2
 *     - 25 from t1 (all 12 multiples + 13 random re-hits weighted to hard ones)
 *     - 25 from t2 (same)
 *   Block B (40q): mixed
 *     - 12 addition
 *     - 12 subtraction
 *     - 16 cross/mixed involving t1 and t2
 */
function generateSession(t1, t2) {
  const questions = [];

  // ---- Block A: 50 multiplication ----
  // All 12 standard multiples for each table, then fill to 25 with hard ones (7-12)
  function multBlock(tNum, count) {
    const pool = [];
    // All 12 first
    for (let n = 1; n <= 12; n++) pool.push(makeMultQ(tNum, n));
    shuffle(pool);

    // Fill remaining with harder multipliers (7-12 weighted)
    const hardPool = [];
    for (let extra = 0; extra < count - 12; extra++) {
      hardPool.push(makeMultQ(tNum, randInt(7, 12)));
    }
    return shuffle([...pool, ...hardPool]).slice(0, count);
  }

  const blockA = shuffle([...multBlock(t1, 25), ...multBlock(t2, 25)]);
  questions.push(...blockA);

  // ---- Block B: 40 mixed ----
  const blockB = [];

  // 12 addition
  for (let i = 0; i < 12; i++) {
    // Mix: some involve multiples of tables
    if (i < 6) {
      // plain addition up to ~200
      blockB.push(makeAddQ(150));
    } else {
      // addition using table products
      const n1 = randInt(1, 12), n2 = randInt(1, 12);
      const a = t1 * n1, b = t2 * n2;
      blockB.push({
        type: 'add', expr: `${a} + ${b}`,
        a, op: '+', b, answer: a + b,
        display: `${a} + ${b} = ?`, tableTag: `${t1}×${t2}×`
      });
    }
  }

  // 12 subtraction
  for (let i = 0; i < 12; i++) {
    if (i < 6) {
      blockB.push(makeSubQ(150));
    } else {
      const n1 = randInt(1, 12), n2 = randInt(1, 12);
      const raw = [t1 * n1, t2 * n2];
      raw.sort((a, b) => b - a);
      blockB.push({
        type: 'sub', expr: `${raw[0]} − ${raw[1]}`,
        a: raw[0], op: '−', b: raw[1], answer: raw[0] - raw[1],
        display: `${raw[0]} − ${raw[1]} = ?`, tableTag: `${t1}×${t2}×`
      });
    }
  }

  // 16 cross/mixed
  for (let i = 0; i < 16; i++) {
    blockB.push(makeCrossQ(t1, t2));
  }

  questions.push(...shuffle(blockB));

  // Final: tag each with index and blank user fields
  return questions.map((q, i) => ({
    ...q,
    index: i,
    userAnswer: null,
    isCorrect: null,
    timeTaken: null,
    timedOut: false,
  }));
}

/**
 * scoreSession(questions)
 * Returns score object with full analytics.
 */
function scoreSession(questions) {
  const total = questions.length;
  let correct = 0, wrong = 0, timeouts = 0;
  let totalTime = 0;
  const byType = { mult: { c: 0, t: 0 }, add: { c: 0, t: 0 }, sub: { c: 0, t: 0 }, cross: { c: 0, t: 0 } };

  questions.forEach(q => {
    if (q.timedOut) {
      timeouts++;
    } else if (q.isCorrect) {
      correct++;
    } else {
      wrong++;
    }
    if (q.timeTaken != null) totalTime += q.timeTaken;
    const bt = byType[q.type] || { c: 0, t: 0 };
    bt.t++;
    if (q.isCorrect) bt.c++;
    byType[q.type] = bt;
  });

  const accuracy = Math.round((correct / total) * 100);
  const avgTime = totalTime > 0 ? (totalTime / total / 1000).toFixed(1) : '--';

  // Score: 100 base * accuracy * speed bonus
  const speedBonus = avgTime !== '--' ? Math.max(1, (10 - parseFloat(avgTime)) / 10) : 1;
  const finalScore = Math.round(accuracy * speedBonus);

  let grade = 'F';
  if (finalScore >= 95) grade = 'S+';
  else if (finalScore >= 85) grade = 'A';
  else if (finalScore >= 70) grade = 'B';
  else if (finalScore >= 55) grade = 'C';
  else if (finalScore >= 40) grade = 'D';

  let title = 'Keep Going';
  if (grade === 'S+') title = 'LIGHTNING MASTER ⚡';
  else if (grade === 'A') title = 'Sharp & Fast 🎯';
  else if (grade === 'B') title = 'Good Momentum 💪';
  else if (grade === 'C') title = 'Building Up ⚙️';
  else title = 'Rise Tomorrow 🌅';

  return {
    total, correct, wrong, timeouts,
    accuracy, avgTime, finalScore, grade, title,
    byType,
    questions,
  };
}

/**
 * getComboMessage(streak)
 * Returns motivational text for combo streaks.
 */
function getComboMessage(streak) {
  if (streak >= 10) return { label: 'UNSTOPPABLE', emoji: '⚡' };
  if (streak >= 7)  return { label: 'ON FIRE',     emoji: '🔥' };
  if (streak >= 5)  return { label: 'COMBO',       emoji: '✨' };
  if (streak >= 3)  return { label: 'STREAK',      emoji: '💥' };
  return null;
}

// BEAUTY & THE MATHS — Sound Engine
// Web Audio API — no external files needed
// =============================================

let ctx = null;

function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

function play(freq, type, duration, gainVal = 0.15, fadeOut = true) {
  try {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(gainVal, ac.currentTime);
    if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

  if (!history.length) return `
    <div class="empty-page">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No sessions yet</div>
      <div class="empty-sub">Complete your first session and it will appear here.</div>
    </div>`;

  const rows = filtered.map(s => `
    <div class="history-row">
      <div class="hr-date">
        <span class="hr-day">${new Date(s.date).toLocaleDateString('en',{day:'numeric',month:'short'})}</span>
        <span class="hr-time">${new Date(s.date).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      <div class="hr-tables">${(s.tables||[]).join(' & ')}×</div>
      <div class="hr-grade" style="color:${gradeColor(s.grade)}">${s.grade}</div>
      <div class="hr-acc ${s.accuracy>=80?'green':s.accuracy>=60?'amber':'red'}">${s.accuracy}%</div>
      <div class="hr-score">${s.score}pts</div>
      <div class="hr-speed">${s.avgTime}s</div>
    </div>`).join('');

  return `
    <div class="history-page">
      <div class="page-header">
        <div class="page-title">Session History</div>
        <div class="filter-tabs">
          ${filters.map(f=>`<button class="filter-tab ${state.historyFilter===f?'active':''}" data-filter="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
        </div>
      </div>
      <div class="history-table">
        <div class="history-header">
          <span>Date</span><span>Tables</span><span>Grade</span><span>Accuracy</span><span>Score</span><span>Avg Speed</span>
        </div>
        <div class="history-body">${rows || '<div class="no-data">No sessions in this period</div>'}</div>
      </div>
    </div>`;
}

function renderAnalysis() {
  const stats = getOverallStats();
  const days = getLast7Days();
  const wrongs = getTopWrongs(8);
  const tableData = loadTableData();
  const history = loadHistory();

  if (!stats) return `
    <div class="empty-page">
      <div class="empty-icon">📈</div>
      <div class="empty-title">No data yet</div>
      <div class="empty-sub">Complete at least one session to see your analysis.</div>
    </div>`;

  // Bar chart: last 7 days accuracy
  const maxAcc = 100;
  const barChart = days.map(d => `
    <div class="bar-col">
      <div class="bar-wrap">
        <div class="bar-fill ${d.avgAccuracy===null?'bar-empty':''}"
          style="height:${d.avgAccuracy!==null?d.avgAccuracy:0}%;background:${
            d.avgAccuracy===null?'var(--border)':
            d.avgAccuracy>=80?'var(--green)':
            d.avgAccuracy>=60?'var(--amber)':'var(--red)'
          }">
          ${d.avgAccuracy!==null?`<span class="bar-val">${d.avgAccuracy}%</span>`:''}
        </div>

      <div class="bar-label">${d.label}</div>
      <div class="bar-sessions">${d.sessions>0?d.sessions+'s':''}</div>
    </div>`).join('');

  // Top tables practiced
  const topTables = Object.entries(tableData)
    .sort((a,b)=>b[1].sessions-a[1].sessions).slice(0,8);

  const tableCards = topTables.map(([num, t]) => {
    const mastered = t.masteryScore>=80 && t.sessions>=3;
    const acc = t.totalQ>0 ? Math.round((t.correct/t.totalQ)*100) : 0;
    return `
      <div class="table-card ${mastered?'mastered':''}">
        <div class="tc-num">${num}×</div>
        <div class="tc-ms-bar"><div class="tc-ms-fill" style="width:${t.masteryScore}%"></div></div>
        <div class="tc-stats">
          <span>${t.masteryScore}% mastery</span>
          <span>${t.sessions} sessions</span>
          <span>${acc}% accuracy</span>
        </div>
        ${mastered?'<div class="tc-badge">✓ Mastered</div>':''}
      </div>`;
  }).join('');

  // Wrong expressions
  const wrongsList = wrongs.length ? wrongs.map(w=>`
    <div class="wrong-row">
      <span class="wrong-expr">${w.expr}</span>
      <span class="wrong-count">${w.count}×</span>
      <div class="wrong-bar"><div class="wrong-fill" style="width:${Math.min(100,(w.count/wrongs[0].count)*100)}%"></div></div>
    </div>`).join('') : '<div class="no-data">No wrong answers tracked yet</div>';

  // Grade distribution from history
  const grades = {S:0,A:0,B:0,C:0,D:0,F:0};
  history.forEach(s=>{ const g=s.grade?.replace('+',''); if(grades[g]!==undefined) grades[g]++; });
  const totalGrades = Object.values(grades).reduce((a,b)=>a+b,0);
  const gradeDist = Object.entries(grades).filter(([,v])=>v>0).map(([g,v])=>`
    <div class="grade-bar-row">
      <span class="grade-lbl" style="color:${gradeColor(g)}">${g}</span>
      <div class="grade-bar-wrap"><div class="grade-bar-fill" style="width:${totalGrades?Math.round(v/totalGrades*100):0}%;background:${gradeColor(g)}"></div></div>
      <span class="grade-count">${v}</span>
    </div>`).join('');

  return `
    <div class="analysis-page">
      <div class="page-header">
        <div class="page-title">Your Analysis</div>
        <div class="page-sub">${stats.totalSessions} sessions · ${stats.totalQ.toLocaleString()} questions answered</div>
      </div>

      <!-- Overall KPIs -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-val" style="color:var(--green)">${stats.avgAccuracy}%</div>
          <div class="kpi-lbl">Avg Accuracy</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-val" style="color:var(--amber)">${stats.bestScore}</div>
          <div class="kpi-lbl">Best Score</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-val">${state.streakBest}</div>
          <div class="kpi-lbl">Best Streak</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-val" style="color:var(--green)">${stats.masteredCount}</div>
          <div class="kpi-lbl">Tables Mastered</div>
        </div>
      </div>

      <!-- 7 day chart -->
      <div class="analysis-card">
        <div class="card-title">Last 7 Days — Accuracy</div>
        <div class="bar-chart">${barChart}</div>
      </div>

      <!-- Grade distribution -->
      <div class="analysis-card">
        <div class="card-title">Grade Distribution</div>
        <div class="grade-dist">${gradeDist}</div>
      </div>

      <!-- Table mastery -->
      <div class="analysis-card">
        <div class="card-title">Table Progress</div>
        ${topTables.length ? `<div class="table-cards">${tableCards}</div>` : '<div class="no-data">No tables practiced yet</div>'}
      </div>

      <!-- Top wrong answers -->
      <div class="analysis-card">

// =============================================
function startCountdown(cb) {
  state.countdownActive = true;
  const page = document.getElementById('main-arena');
  if (!page) { cb(); return; }
  let count = 3;
  page.innerHTML = `<div class="countdown-screen"><div class="cd-num" id="cd-num">3</div><div class="cd-label">Get Ready</div></div>`;
  const interval = setInterval(() => {
    count--;
    const el = document.getElementById('cd-num');
    if (count > 0 && el) {
      el.textContent = count;
      el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
    } else {
      clearInterval(interval);
      state.countdownActive = false;
      cb();
    }
  }, 750);
}

function startSession() {
  if (state.selectedTables.length !== 2) return;
  const [t1, t2] = state.selectedTables;
  state.questions = generateSession(t1, t2);
  state.currentQ = 0;
  state.combo = 0;
  state.pendingInput = '';
  state.page = 'session';
  state.paused = false;
  closeAllModals();

  // Update navbar
  const navbar = document.querySelector('.navbar');
  if (navbar) navbar.outerHTML = renderNavbar();

  // 3-2-1 countdown then start
  state.sessionStarted = false;
  const arena = document.getElementById('main-arena');
  if (arena) {
    arena.innerHTML = renderSession();
    bindSessionEvents();
  }
  startCountdown(() => {
    state.sessionStarted = true;
    updateSessionUI();
    focusInput();
    if (state.sound) sounds.sessionStart();
    startTimer();
  });
}

function startTimer() {
  clearInterval(state.timer);
  state.timeLeft = QUESTION_TIME;
  updateTimerUI();
  state.timer = setInterval(() => {
    if (state.paused) return;
    state.timeLeft--;
    updateTimerUI();
    if (state.timeLeft <= 3 && state.timeLeft > 0 && state.sound) sounds.tick();
    if (state.timeLeft <= 0) onTimeout();
  }, 1000);
}

function onTimeout() {
  clearInterval(state.timer);
  const q = state.questions[state.currentQ];
  q.timedOut = true; q.isCorrect = false; q.timeTaken = QUESTION_TIME * 1000;
  state.combo = 0;
  if (state.sound) sounds.timeout();
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  flashInput('timeout');
  updateMobileAns('timeout');
  setTimeout(advanceQuestion, 700);
}

function submitAnswer() {
  if (!state.sessionStarted || state.paused) return;
  const input = document.getElementById('answer-input');
  const rawVal = input ? input.value.trim() : state.pendingInput.trim();
  const val = parseInt(rawVal, 10);
  if (isNaN(val) || rawVal === '') return;

  clearInterval(state.timer);
  const q = state.questions[state.currentQ];
  q.userAnswer = val;
  q.timeTaken  = (QUESTION_TIME - state.timeLeft) * 1000;
  q.isCorrect  = (val === q.answer);

  if (q.isCorrect) {
    state.combo++;
    if (state.sound) sounds.correct();
    if (state.combo >= 3 && state.sound) sounds.combo();
    if (navigator.vibrate) navigator.vibrate(30);
    flashInput('correct'); updateMobileAns('correct');
  } else {
    state.combo = 0;
    if (state.sound) sounds.wrong();
    if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
    flashInput('wrong'); updateMobileAns('wrong');
  }
  setTimeout(advanceQuestion, 400);
}

function advanceQuestion() {
  state.currentQ++;
  state.pendingInput = '';
  if (state.currentQ >= TOTAL_QUESTIONS) { endSession(); return; }
  updateSessionUI();
  focusInput();
  startTimer();
}

function endSession() {
  clearInterval(state.timer);
  const score = scoreSession(state.questions);
  score.tables = state.selectedTables;
  score.totalTimeMs = state.questions.reduce((s,q)=>s+(q.timeTaken||0),0);
  state.results = score;

  saveSessionResult(score);
  const streakData = loadStreak();
  state.streak = streakData.count;
  state.streakBest = streakData.best;

  if (state.sound) sounds.sessionEnd();
  state.page = 'results';
  renderApp();

  // Streak celebration
  if (state.streak >= 3) {
    const sc = document.getElementById('streak-celebrate');
    if (sc) { sc.style.display='flex'; setTimeout(()=>{sc.style.display='none';},3000); }
  }
}

function pauseSession() {
  if (!state.sessionStarted) return;
  state.paused = true;
  const modal = document.getElementById('pause-modal');
  if (modal) {
    modal.querySelector('.modal-sub').textContent = `Q${state.currentQ+1}/90 · ${state.selectedTables.join(' & ')}× Tables`;
    modal.style.display = 'flex';
  }
}

function resumeSession() {
  state.paused = false;
  const modal = document.getElementById('pause-modal');
  if (modal) modal.style.display = 'none';
  focusInput();
}

function exitSession() {
  clearInterval(state.timer);
  state.page = 'home';
  state.questions = [];
  state.currentQ = 0;
  state.sessionStarted = false;
  state.paused = false;
  closeAllModals();
  renderApp();
}

function closeAllModals() {
  ['exit-modal','pause-modal'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

// =============================================
function updateSessionUI() {
  const q = state.questions[state.currentQ];
  if (!q) return;

  const qt = document.getElementById('question-text');
  if (qt) {
    qt.innerHTML = `${q.display.replace('= ?','')}<span class="q-placeholder">= ?</span>`;
    qt.style.animation = 'none'; qt.offsetHeight; qt.style.animation = '';
  }

  const input = document.getElementById('answer-input');
  if (input) { input.value = ''; input.className = 'answer-input'; }

  const mAns = document.getElementById('mobile-ans-val');
  if (mAns) { mAns.textContent = '_'; mAns.className = 'ans-val'; }

  const fill = document.querySelector('.session-progress-fill');
  if (fill) fill.style.width = `${(state.currentQ/TOTAL_QUESTIONS)*100}%`;

  document.querySelectorAll('.q-dot').forEach((dot,i) => {
    const sq = state.questions[i];
    dot.className = 'q-dot' +
      (i===state.currentQ?' active':'') +
      (sq.isCorrect===true?' correct':'') +
      (sq.timedOut?' timeout':'') +
      (sq.isCorrect===false&&!sq.timedOut?' wrong':'');
  });

  const chips = document.querySelectorAll('.meta-chip .val');
  if (chips[0]) chips[0].textContent = `${state.currentQ+1}/${TOTAL_QUESTIONS}`;
  const correct = state.questions.filter(q=>q.isCorrect===true).length;
  const wrong   = state.questions.filter(q=>q.isCorrect===false||q.timedOut).length;
  if (chips[1]) chips[1].textContent = correct;
  if (chips[2]) chips[2].textContent = wrong;
  if (chips[3]) chips[3].textContent = state.currentQ>0?Math.round((correct/state.currentQ)*100)+'%':'100%';

  const combo = document.getElementById('combo-display');
  if (combo) {
    const msg = getComboMessage(state.combo);
    combo.className = `combo-display ${state.combo>=3?'visible':''}`;
    combo.innerHTML = state.combo>=3?`<span class="combo-num">×${state.combo}</span>${msg?.label||''}`:'';
  }

  const typeEl = document.querySelector('.question-type-tag');
  if (typeEl) typeEl.textContent = {mult:'✕ Multiply',add:'+ Add',sub:'− Subtract',cross:'⊕ Mixed'}[q.type]||'';

  // Pause modal sub text
  const pSub = document.querySelector('#pause-modal .modal-sub');
  if (pSub) pSub.textContent = `Q${state.currentQ+1}/90 · ${state.selectedTables.join(' & ')}× Tables`;

  // Exit modal sub
  const eSub = document.querySelector('#exit-modal .modal-sub');
  if (eSub) eSub.textContent = `You're on Q${state.currentQ+1} of 90. Progress will be lost.`;
}

function updateTimerUI() {
  const circumference = 138.2;
  const offset = circumference - (state.timeLeft/QUESTION_TIME)*circumference;
  const fill = document.querySelector('.timer-ring-fill');
  const num  = document.querySelector('.timer-num');
  if (fill) {
    fill.style.strokeDashoffset = offset;
    fill.className = 'timer-ring-fill' + (state.timeLeft<=3?' danger':state.timeLeft<=5?' warning':'');
  }
  if (num) num.textContent = state.timeLeft;
}

function flashInput(type) {
  const input = document.getElementById('answer-input');
  if (input) { input.className=`answer-input ${type}`; setTimeout(()=>{if(input)input.className='answer-input';},400); }
}

function updateMobileAns(type) {
  const el = document.getElementById('mobile-ans-val');
  if (el) { el.className=`ans-val ${type}`; setTimeout(()=>{if(el)el.className='ans-val';},400); }
}

function focusInput() {
  if (!state.isMobile) {
    const input = document.getElementById('answer-input');
    if (input) { input.focus(); input.select(); }
  }
}

// =============================================
// EVENTS
// =============================================
function bindGlobalEvents() {
  window.addEventListener('resize', () => { state.isMobile = window.innerWidth <= 768; });

  // Block browser back mid-session
  window.addEventListener('popstate', (e) => {
    if (state.page==='session' && state.sessionStarted) {
      e.preventDefault();
      document.getElementById('exit-modal').style.display = 'flex';
      history.pushState(null,'','');
    }
  });
  history.pushState(null,'','');

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (state.page!=='session' || !state.sessionStarted) return;
    if (e.key==='Escape') { pauseSession(); return; }
    if (e.key==='Enter') { submitAnswer(); return; }
    // Block non-numeric except backspace
    if (!/^\d$/.test(e.key) && e.key!=='Backspace') e.preventDefault();
  });
}

function bindEvents() {
  // Navbar navigation
  document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.page==='session' && state.sessionStarted) {
        const modal = document.getElementById('exit-modal');
        if (modal) { modal.style.display='flex'; }
        // Store pending page
        state._pendingPage = btn.dataset.page;
        return;
      }
      navigateTo(btn.dataset.page, btn.dataset.label);
    });
  });

  // Sound toggle
  const soundBtn = document.getElementById('sound-toggle');
  if (soundBtn) soundBtn.addEventListener('click', () => {
    state.sound = !state.sound;
    savePrefs({ sound: state.sound });
    soundBtn.textContent = state.sound ? '🔊' : '🔇';
  });

  // Mobile menu
  const mobileBtn = document.getElementById('mobile-menu-btn');
  if (mobileBtn) mobileBtn.addEventListener('click', () => {
    state.panelOpen = !state.panelOpen;
    const panel = document.getElementById('side-panel');
    const overlay = document.getElementById('panel-overlay');
    if (panel) panel.classList.toggle('open', state.panelOpen);
    if (overlay) overlay.classList.toggle('show', state.panelOpen);
  });

  // Overlay close
  const overlay = document.getElementById('panel-overlay');
  if (overlay) overlay.addEventListener('click', closePanelOverlay);

  // Table cells
  document.querySelectorAll('.table-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const num = parseInt(cell.dataset.table, 10);
      const idx = state.selectedTables.indexOf(num);
      if (idx>=0) state.selectedTables.splice(idx,1);
      else {
        if (state.selectedTables.length>=2) state.selectedTables.shift();
        state.selectedTables.push(num);
      }
      updateSidePanel();
      // Also update home hint
      if (state.page==='home') updateMainContent();
    });
  });

  // Start button
  const startBtn = document.getElementById('btn-start');
  if (startBtn) startBtn.addEventListener('click', () => {
    if (state.selectedTables.length===2) { closePanelOverlay(); startSession(); }
  });

  // Session events
  bindSessionEvents();

  // Results
  const retryBtn = document.getElementById('btn-retry');
  if (retryBtn) retryBtn.addEventListener('click', () => startSession());

  const newBtn = document.getElementById('btn-new');
  if (newBtn) newBtn.addEventListener('click', () => {
    state.selectedTables = [];
    state.page = 'home';
    state.results = null;
    renderApp();
  });

  const homeBtn = document.getElementById('btn-home');
  if (homeBtn) homeBtn.addEventListener('click', () => {
    state.page = 'home'; state.results = null;
    updateMainContent(); updateNavActive();
  });

  // History filters
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      state.historyFilter = btn.dataset.filter;
      updateMainContent();
    });
  });

  // Exit modal
  const exitConfirm = document.getElementById('exit-confirm');
  if (exitConfirm) exitConfirm.addEventListener('click', () => {
    exitSession();
    if (state._pendingPage) { navigateTo(state._pendingPage); state._pendingPage=null; }
  });

  const exitCancel = document.getElementById('exit-cancel');
  if (exitCancel) exitCancel.addEventListener('click', closeAllModals);

  // Pause modal
  const resumeBtn = document.getElementById('resume-btn');
  if (resumeBtn) resumeBtn.addEventListener('click', resumeSession);

  const pauseExitBtn = document.getElementById('pause-exit-btn');
  if (pauseExitBtn) pauseExitBtn.addEventListener('click', exitSession);
}

function bindSessionEvents() {
  const pauseBtn = document.getElementById('pause-btn');
  if (pauseBtn) pauseBtn.addEventListener('click', pauseSession);

  const answerInput = document.getElementById('answer-input');
  if (answerInput) {
    // Only allow numeric input
    answerInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g,'').slice(0,5);
    });
    answerInput.addEventListener('keydown', (e) => {
      if (e.key==='Enter') submitAnswer();
    });
  }

  // Numpad
  document.querySelectorAll('.numpad-btn[data-num]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.pendingInput = (state.pendingInput + btn.dataset.num).slice(0,5);
      const input = document.getElementById('answer-input');
      if (input) input.value = state.pendingInput;
      const mAns = document.getElementById('mobile-ans-val');
      if (mAns) mAns.textContent = state.pendingInput || '_';
    });
  });

  const npDel = document.getElementById('np-del');
  if (npDel) npDel.addEventListener('click', () => {
    state.pendingInput = state.pendingInput.slice(0,-1);
    const input = document.getElementById('answer-input');
    if (input) input.value = state.pendingInput;
    const mAns = document.getElementById('mobile-ans-val');
    if (mAns) mAns.textContent = state.pendingInput || '_';
  });

  const npEnter = document.getElementById('np-enter');
  if (npEnter) npEnter.addEventListener('click', submitAnswer);
}

// =============================================
// NAVIGATION HELPERS
// =============================================
function navigateTo(page, label) {
  if (page.startsWith('cs-') || page==='coming') {
    state.page = `cs-${label||page.replace('cs-','')}`;
  } else {
    state.page = page;
  }
  clearInterval(state.timer);
  updateMainContent();
  updateNavActive();
}

function closePanelOverlay() {
  state.panelOpen = false;
  const panel = document.getElementById('side-panel');
  const overlay = document.getElementById('panel-overlay');
  if (panel) panel.classList.remove('open');
  if (overlay) overlay.classList.remove('show');
}

function updateMainContent() {
  const arena = document.getElementById('main-arena');
  if (arena) arena.innerHTML = renderMainContent();
  bindEvents();
}

function updateNavActive() {
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page===state.page);
  });
  // Update navbar streak/today count
  const nb = document.querySelector('.navbar');
  if (nb) nb.outerHTML = renderNavbar();
  bindEvents();
}

function updateSidePanel() {
  const panel = document.getElementById('side-panel');
  if (!panel) return;
  panel.outerHTML = renderSidePanel();
  bindEvents();
}

// =============================================
// UTILITIES
// =============================================
function gradeColor(grade) {
  const g = (grade||'').replace('+','');
  return {S:'#00ff88',A:'#00ff88',B:'#4488ff',C:'#ffaa00',D:'#ff8844',F:'#ff4466'}[g]||'#888';
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${Math.floor(diff/86400000)}d ago`;
}
